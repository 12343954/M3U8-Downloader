name: Building M3U8-Downloader CI/CD

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      YARN_NODE_LINKER: node-modules
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: [22.14.0]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Check Yarn
        run: node .yarn/releases/yarn-3.5.1.cjs --version

      - name: Install
        run: node .yarn/releases/yarn-3.5.1.cjs install --immutable

      - name: Smoke test
        run: node .yarn/releases/yarn-3.5.1.cjs smoke

      - name: Build
        run: node .yarn/releases/yarn-3.5.1.cjs ${{ matrix.os }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/M3U8-Downloader-*
            !dist/M3U8-Downloader-*.blockmap
